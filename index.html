<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Premier League</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="epl-logo">
        <div class="lion-icon">&#127944;</div>
      </div>
      <div class="header-text">
        <h1>Premier League</h1>
        <p class="subtitle">2024/25 Season</p>
      </div>
    </div>
  </header>

  <main>
    <!-- Clubs View -->
    <section id="clubs-view">
      <h2 class="section-title">All Clubs</h2>
      <div id="clubs-grid" class="clubs-grid"></div>
    </section>

    <!-- Players View -->
    <section id="players-view" class="hidden">
      <button id="back-btn" class="back-btn">&#8592; Back to Clubs</button>
      <div id="club-header" class="club-header"></div>
      <div id="players-grid" class="players-grid"></div>
    </section>
  </main>

  <footer>
    <p>Premier League 2024/25 &mdash; All club and player data for informational purposes.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
